services:

  db:
    image: postgres:16-alpine
    container_name: house_finances_db
    environment:
      POSTGRES_DB: house_finances
      POSTGRES_USER: hfuser
      POSTGRES_PASSWORD: hfpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hfuser -d house_finances"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../../apps/backend
      dockerfile: HouseFinances.Api/Dockerfile
    container_name: house_finances_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=db;Database=house_finances;Username=hfuser;Password=hfpassword
      - Jwt__Key=HouseFinancesDefaultSecretKey!ChangeInProduction2025
      - Jwt__Issuer=HouseFinances
      - Jwt__Audience=HouseFinancesUsers
    restart: unless-stopped

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    container_name: house_finances_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
